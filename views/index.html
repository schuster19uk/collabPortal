<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome — Collaborators Booking Portal</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/landing.css">
</head>
<body>
    <div id="navbar-container"></div>
 
    <main>
        <section class="landing-hero">
            <div class="landing-logo">📅</div>
            <h1 class="landing-title">Collaborators Booking Portal</h1>
            <p class="landing-subtitle">
                Easily view available slots and secure your booking instantly.
            </p>
        </section>
 
        <div class="feature-list">
            <div class="feature-row">
                <span class="feature-icon">⚡</span>
                <div class="feature-text">
                    <h4>Real-time Booking</h4>
                    <p>Instantly claim slots and get immediate confirmations.</p>
                </div>
            </div>
            <div class="feature-row">
                <span class="feature-icon">🌐</span>
                <div class="feature-text">
                    <h4>Multi-Timezone</h4>
                    <p>Booking slots automatically adjust and display in your local timezone.</p>
                </div>
            </div>
        </div>
    </main>
 
    <div id="footer-container"></div>
 
    <script src="/js/loader.js"></script>
    <script src="/js/theme.js"></script>
</body>
</html>
